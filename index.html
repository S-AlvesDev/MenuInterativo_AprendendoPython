<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Imóveis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header id="header">
  <div class="logo">SS Imóveis</div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Imóveis</a>
    <a href="#">Contato</a>
    <a href="login.html" class="btn">Entrar</a>
  </nav>
</header>

<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Seu novo imóvel começa aqui</h1>
    <p>As melhores oportunidades em Nova Cruz e região</p>

    <div class="search-box">
      <input type="text" placeholder="Cidade, bairro ou tipo...">
      <button>Buscar</button>
    </div>
  </div>
</section>

<section class="imoveis">

  <h2>Destaques</h2>

  <div class="grid">

    <div class="card">
      <span class="tag vendido">VENDIDO</span>
      <img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994">
      <div class="info">
        <h3>Casa moderna</h3>
        <p>3 quartos • 2 banheiros</p>
        <span class="price">R$ 350.000</span>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
      <div class="info">
        <h3>Apartamento central</h3>
        <p>2 quartos • 1 vaga</p>
        <span class="price">R$ 220.000</span>
      </div>
    </div>

  </div>

</section>

<!-- WHATSAPP FLOAT -->
<a href="#" class="whatsapp">💬</a>

<footer>
  <p>© 2026 SS Imóveis</p>
</footer>

<script src="script.js"></script>

</body>
</html>
